server:
  port: 8080

spring:
  application:
    name: agent-framework

llm:
  provider: ${LLM_PROVIDER:none}
  enabled: ${LLM_ENABLED:false}
  api:
    url: ${LLM_API_URL:}
    key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:}


mcp:
  # Enable dynamic tool discovery from MCP servers at startup
  discovery:
    enabled: ${MCP_DISCOVERY_ENABLED:false}  # Set to true to auto-discover tools

  jira:
    url: ${MCP_JIRA_URL:http://localhost:8081/mcp-webex-jira}
    pat-token: ${JIRA_PAT_TOKEN:}
  confluence:
    url: ${MCP_CONFLUENCE_URL:}
    pat-token: ${CONFLUENCE_PAT_TOKEN:}

  github:
    url: ${MCP_GITHUB_URL:}
    pat-token: ${GITHUB_PAT_TOKEN:}

  # Webex MCP Server (REST API pattern - different from JSON-RPC)
  # Endpoint pattern: /mcp/tools/{tool_name}
  # Auth: X-Webex-Token header
  webex:
    url: ${MCP_WEBEX_URL:https://486bb93842a3.ngrok-free.app}
    token: ${WEBEX_TOKEN:}

logging:
  level:
    root: INFO
    com.agentframework: DEBUG
    org.springframework.web.reactive.function.client: DEBUG

downstream:
  agent:
    url: ${DOWNSTREAM_AGENT_URL:https://4df2612f27c1.ngrok-free.app}

# =====================================================
# ML SERVICE CONFIGURATION
# Python microservice for ML-based tool prediction
# =====================================================
ml:
  service:
    # URL of the Python ML service
    url: ${ML_SERVICE_URL:http://localhost:8001}
    # Enable/disable ML service integration
    enabled: ${ML_SERVICE_ENABLED:false}
    # Timeout for ML service calls (in milliseconds)
    timeout: ${ML_SERVICE_TIMEOUT:5000}

# =====================================================
# TOOL PREDICTION CONFIGURATION
# =====================================================
prediction:
  # Default prediction method: keyword, llm, cosine, ml_classifier, hybrid
  default-method: ${PREDICTION_METHOD:hybrid}
  # Minimum confidence threshold for predictions
  min-confidence: ${PREDICTION_MIN_CONFIDENCE:0.5}
  # Maximum number of tools to return
  max-tools: ${PREDICTION_MAX_TOOLS:5}
  # Enable caching of predictions
  cache:
    enabled: ${PREDICTION_CACHE_ENABLED:true}
    ttl-seconds: ${PREDICTION_CACHE_TTL:300}

# =====================================================
# ASYNC CONFIGURATION
# =====================================================
spring.task.execution:
  pool:
    core-size: 4
    max-size: 16
    queue-capacity: 100
  thread-name-prefix: "tool-prediction-"
